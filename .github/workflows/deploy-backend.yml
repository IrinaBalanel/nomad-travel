name: Backend CI/CD

on:
  push:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    env:
      IMAGE_REPOSITORY: ${{ secrets.CONTAINER_IMAGE_REPOSITORY }}
      IMAGE_TAG: ${{ github.sha }}
      DEPLOY_DIR: /opt/nomad-travel
      HOSTING_LXC_ID: ${{ secrets.HOSTING_LXC_ID }}
      PROXMOX_HOST: ${{ secrets.PROXMOX_HOST }}
      PROXMOX_USER: ${{ secrets.PROXMOX_USER }}
      CONTAINER_REGISTRY_HOST: ${{ secrets.CONTAINER_REGISTRY_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY_HOST }}
          username: ${{ secrets.GITLAB_REGISTRY_USER }}
          password: ${{ secrets.GITLAB_REGISTRY_PASSWORD }}

      - name: Build and push image
        run: |
          set -euo pipefail
          docker build -t "${IMAGE_REPOSITORY}:${IMAGE_TAG}" -t "${IMAGE_REPOSITORY}:main" .
          docker push "${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker push "${IMAGE_REPOSITORY}:main"

      - name: Prepare deploy env
        run: |
          cat > deploy.env <<'ENV'
          IMAGE=${IMAGE_REPOSITORY}:${IMAGE_TAG}
          APP_PORT=8001
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          UNSPLASH_API_KEY=${{ secrets.UNSPLASH_API_KEY }}
          ENV

      - name: Configure SSH key
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          echo "${{ secrets.PROXMOX_SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$PROXMOX_HOST" >> ~/.ssh/known_hosts

      - name: Upload compose and env to hosting LXC via Proxmox
        run: |
          set -euo pipefail
          ssh "${PROXMOX_USER}@${PROXMOX_HOST}" "pct exec ${HOSTING_LXC_ID} -- mkdir -p ${DEPLOY_DIR}"
          ssh "${PROXMOX_USER}@${PROXMOX_HOST}" "pct exec ${HOSTING_LXC_ID} -- bash -lc 'cat > ${DEPLOY_DIR}/docker-compose.yml'" < docker-compose.yml
          ssh "${PROXMOX_USER}@${PROXMOX_HOST}" "pct exec ${HOSTING_LXC_ID} -- bash -lc 'cat > ${DEPLOY_DIR}/.env'" < deploy.env

      - name: Deploy on hosting LXC
        run: |
          set -euo pipefail
          ssh "${PROXMOX_USER}@${PROXMOX_HOST}" "pct exec ${HOSTING_LXC_ID} -- bash -lc 'cd ${DEPLOY_DIR} && docker compose pull && docker compose up -d --remove-orphans'"

      - name: Smoke test
        run: curl -fsS https://nomad-travel.irinabalanel.com >/dev/null
