stages:
  - build
  - deploy

variables:
  IMAGE_REPOSITORY: "$CI_REGISTRY_IMAGE"
  IMAGE_TAG: "$CI_COMMIT_SHA"

build:image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --context "$CI_PROJECT_DIR" --dockerfile "$CI_PROJECT_DIR/Dockerfile" --destination "$IMAGE_REPOSITORY:$IMAGE_TAG" --destination "$IMAGE_REPOSITORY:main"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy:hosting:
  stage: deploy
  image: alpine:3.21
  before_script:
    - apk add --no-cache openssh-client
    - install -m 700 -d ~/.ssh
    - echo "$DEPLOY_SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      set -euo pipefail
      deploy_user="${DEPLOY_USER:-root}"
      deploy_dir="/opt/nomad-travel"
      cat > deploy.env <<ENV
      IMAGE=${IMAGE_REPOSITORY}:${IMAGE_TAG}
      APP_PORT=8001
      YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      UNSPLASH_API_KEY=${UNSPLASH_API_KEY}
      ENV
      ssh "${deploy_user}@${DEPLOY_HOST}" "mkdir -p ${deploy_dir}"
      ssh "${deploy_user}@${DEPLOY_HOST}" "cat > ${deploy_dir}/docker-compose.yml" < docker-compose.yml
      ssh "${deploy_user}@${DEPLOY_HOST}" "cat > ${deploy_dir}/.env" < deploy.env
      ssh "${deploy_user}@${DEPLOY_HOST}" "cd ${deploy_dir} && docker compose pull && docker compose up -d --remove-orphans"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
